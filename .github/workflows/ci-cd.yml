name: Cocoa CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # コード品質チェックとテスト
  quality-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with pylint
      run: |
        pylint main/ --disable=C,R,W0613,W0105 --output-format=text | head -50

    - name: Type checking with mypy
      run: |
        mypy main/ --ignore-missing-imports || true

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short --maxfail=5

  # セキュリティスキャン
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Security scan with bandit
      run: |
        pip install bandit
        bandit -r main/ -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

  # Dockerイメージビルド
  docker-build:
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          cocoa/avatar-management:latest
          cocoa/avatar-management:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # デプロイメント（開発環境）
  deploy-dev:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
    - name: Deploy to development server
      run: |
        echo "Deploying to development environment..."
        # 実際のデプロイメントコマンドをここに実装
        # kubectl apply -f k8s/dev/ など

  # デプロイメント（本番環境）
  deploy-prod:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Deploy to production server
      run: |
        echo "Deploying to production environment..."
        # 実際のデプロイメントコマンドをここに実装
        # kubectl apply -f k8s/prod/ など

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    if: always()

    steps:
    - name: Notify deployment status
      run: |
        echo "Pipeline completed with status: ${{ job.status }}"
