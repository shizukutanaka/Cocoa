services:
  # Cocoa API + frontend
  #
  # main/api_server.py is a single FastAPI app serving all marketplace/auth/
  # avatar/security endpoints in one process -- there is no code-level split
  # into separate services. This file previously declared five separate
  # "microservices" (api-gateway, avatar-service, security-service,
  # collaboration-service, ai-service), each pointing at its own
  # docker/*.Dockerfile. None of those five Dockerfiles ever existed, so
  # `docker-compose build` failed immediately for all of them. Consolidated
  # to the one service that actually works.
  #
  # There used to also be a separate `frontend` service here, pointing at
  # docker/frontend.Dockerfile -- which never existed either, so `build`
  # would have failed for it the same way. It's gone now for a better reason
  # than just "the Dockerfile is missing": docker/Dockerfile is a multi-stage
  # build that compiles frontend/ (Vite+React+TS) in its first stage and
  # copies the built frontend/dist into this same image, which
  # main/api_server.py then serves directly (StaticFiles + a SPA fallback
  # route) -- no second container, no separate port, one deployable image.
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Matches main/api_server.py + everything it imports -- see
      # .env.example for the full list and where each one is actually read;
      # anything not read by a reachable module is deliberately absent here.
      - ENVIRONMENT=production
      - COCOA_JWT_SECRET=${COCOA_JWT_SECRET}
      - COCOA_2FA_SECRET=${COCOA_2FA_SECRET}
      - COCOA_CACHE_HMAC_KEY=${COCOA_CACHE_HMAC_KEY}
      - COCOA_CORS_ORIGINS=${COCOA_CORS_ORIGINS}
      - COCOA_ADMIN_PASSWORD=${COCOA_ADMIN_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cocoa
      - DB_USER=cocoa
      - DB_PASSWORD=${DB_PASSWORD:-cocoa_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=cocoa
      - POSTGRES_USER=cocoa
      # Same variable + default as the api service's DB_PASSWORD above --
      # kept as one source of truth rather than two hardcoded strings that
      # could silently drift apart. Set DB_PASSWORD in your .env for
      # anything beyond local/throwaway use.
      - POSTGRES_PASSWORD=${DB_PASSWORD:-cocoa_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoa -d cocoa"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  #
  # NOTE: main/api_server.py's /metrics endpoint returns JSON and requires
  # auth, so it is not a valid Prometheus scrape target. The real
  # Prometheus-format exporter (main/prometheus_monitor.py) currently runs
  # as its own standalone process, not inside this container -- wiring it in
  # is a follow-up, not done here. This service is left configured (and
  # docker/prometheus.yml now exists, unlike before) so `docker-compose up`
  # succeeds, but has nothing meaningful to scrape yet beyond itself.
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - cocoa-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    environment:
      # No hardcoded default here on purpose (unlike DB_PASSWORD above) --
      # Grafana's admin account is reachable on a published port (3001) with
      # no other auth in front of it, so "cocoa" or "admin" is a much more
      # dangerous default to ship than the DB password, which is only
      # reachable from inside the compose network. Set GRAFANA_ADMIN_PASSWORD
      # in your .env; compose fails fast with an empty/unset value rather
      # than silently starting Grafana with a guessable password.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in your .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cocoa-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cocoa-network:
    driver: bridge
