services:
  # Cocoa API
  #
  # main/api_server.py is a single FastAPI app serving all marketplace/auth/
  # avatar/security endpoints in one process -- there is no code-level split
  # into separate services. This file previously declared five separate
  # "microservices" (api-gateway, avatar-service, security-service,
  # collaboration-service, ai-service), each pointing at its own
  # docker/*.Dockerfile. None of those five Dockerfiles ever existed, so
  # `docker-compose build` failed immediately for all of them. Even if they
  # had existed, docker/Dockerfile's default CMD runs main/main.py, which is
  # a tkinter GUI launcher -- it cannot run in a headless container at all.
  # Consolidated to the one service that actually works.
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "uvicorn", "main.api_server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - COCOA_SECRET_KEY=${COCOA_SECRET_KEY}
      - COCOA_ENCRYPTION_KEY=${COCOA_ENCRYPTION_KEY}
      - COCOA_2FA_SECRET=${COCOA_2FA_SECRET}
      - DATABASE_URL=postgresql://cocoa:cocoa_password@db:5432/cocoa
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      # The frontend is Vite (import.meta.env.VITE_*), not Create React App --
      # the REACT_APP_API_URL this used to set here was never read by any
      # frontend code.
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - cocoa-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=cocoa
      - POSTGRES_USER=cocoa
      - POSTGRES_PASSWORD=cocoa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoa -d cocoa"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cocoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  #
  # NOTE: main/api_server.py's /metrics endpoint returns JSON and requires
  # auth, so it is not a valid Prometheus scrape target. The real
  # Prometheus-format exporter (main/prometheus_monitor.py) currently runs
  # as its own standalone process, not inside this container -- wiring it in
  # is a follow-up, not done here. This service is left configured (and
  # docker/prometheus.yml now exists, unlike before) so `docker-compose up`
  # succeeds, but has nothing meaningful to scrape yet beyond itself.
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - cocoa-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cocoa-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cocoa-network:
    driver: bridge
