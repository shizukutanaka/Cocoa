# Minimal Prometheus config so `docker-compose up` has a config.file to
# mount (it previously referenced this path with no file present, which
# would fail Prometheus's startup).
#
# main/api_server.py's /metrics endpoint is JSON and requires auth -- not a
# valid scrape target. GET /metrics/prometheus (unauthenticated, real text
# exposition format via main/prometheus_monitor.py's get_prometheus_monitor()
# singleton) is the real target, running in-process in the `api` service
# rather than as prometheus_monitor.py's separate standalone MetricsServer.
# api_server.py's security_middleware now feeds that monitor on every request
# via _record_request_metrics (http request counter + latency histogram,
# labelled by route TEMPLATE to keep cardinality bounded), so the http_request
# counters and request-duration histogram carry real traffic. The remaining
# gauges (cpu/memory/disk) are refreshed on each scrape of /metrics/prometheus.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cocoa-api'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['api:8000']
